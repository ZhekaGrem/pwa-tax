name: check
on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test -- --coverage --project=dom --project=node
        env:
          # Placeholder Firebase env so client init doesn't throw during component tests
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:abc'

  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm install --no-audit --no-fund
      - run: npm run test:rules
